profile:
  store-selected: true
  store-fake-ip: true
hosts:
  "19970626.xyz": 192.168.1.220
  "*.19970626.xyz": 192.168.1.220
  "nas.tailc1b432.ts.net": 100.118.67.82
  "vivo.tailc1b432.ts.net": 100.94.59.105
tun:
  enable: true
  stack: mixed
  auto-route: true
  strict-route: true
  auto-detect-interface: true
  dns-hijack:
    - any:53
sniffer:
  enable: true
  force-dns-mapping: true
  parse-pure-ip: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
dns:
  enable: true
  listen: 127.0.0.1:1053
  ipv6: true
  respect-rules: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    # t-sub:include rules/fake-ip-filter-domain.list
    # t-sub:include rules/fake-ip-filter-tailnet-domain.list
    # t-sub:include rules/fake-ip-filter-android-domain.list
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  proxy-server-nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  direct-nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  direct-nameserver-follow-policy: true
  nameserver:
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query
  fallback:
    - https://1.1.1.1/dns-query
    - https://8.8.8.8/dns-query
    - https://dns.google/dns-query
    - https://cloudflare-dns.com/dns-query
  fallback-filter:
    geoip: true
    geoip-code: CN
    geosite:
      - gfw
      - geolocation-!cn
    ipcidr:
      - 240.0.0.0/4
      - 0.0.0.0/32
    domain:
      - +.google.com
      - +.facebook.com
      - +.youtube.com
      - +.twitter.com
      - +.github.com
  nameserver-policy:
    geosite:cn:
      - https://doh.pub/dns-query
      - https://dns.alidns.com/dns-query
    geosite:private:
      - https://doh.pub/dns-query
      - https://dns.alidns.com/dns-query
    geosite:geolocation-!cn:
      - https://1.1.1.1/dns-query
      - https://8.8.8.8/dns-query
    geosite:google:
      - https://8.8.8.8/dns-query
      - https://dns.google/dns-query
    geosite:github:
      - https://1.1.1.1/dns-query
      - https://cloudflare-dns.com/dns-query
    geosite:openai:
      - https://1.1.1.1/dns-query
      - https://8.8.8.8/dns-query
    geosite:telegram:
      - https://1.1.1.1/dns-query
      - https://8.8.8.8/dns-query
