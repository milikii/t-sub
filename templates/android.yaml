# Android mihomo 配置模板
# 内置 tailscale 出站用于回家，包含 FCM 推送和 Google Play 规则。
# 生成时 {{RULE_BASE_URL}} 会自动替换为 Worker 的 /rules 地址。

mixed-port: 7890
allow-lan: false
bind-address: '*'
mode: rule
log-level: info
ipv6: true
global-client-fingerprint: chrome
external-controller: 127.0.0.1:9090
external-ui: ./ui
external-ui-url: "https://ghp.564672.xyz/https://github.com/MetaCubeX/metacubexd/archive/refs/heads/gh-pages.zip"
secret: ""
unified-delay: true
tcp-concurrent: true

profile:
  store-selected: true
  store-fake-ip: true

hosts:
  "19970626.xyz": 192.168.1.220
  "*.19970626.xyz": 192.168.1.220
  "nas.tailc1b432.ts.net": 100.118.67.82
  "vivo.tailc1b432.ts.net": 100.94.59.105

tun:
  enable: true
  stack: mixed
  auto-route: true
  strict-route: true
  auto-detect-interface: true
  dns-hijack:
    - any:53

sniffer:
  enable: true
  force-dns-mapping: true
  parse-pure-ip: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]

dns:
  enable: true
  listen: 127.0.0.1:1053
  ipv6: true
  cache-algorithm: arc
  respect-rules: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    # t-sub:include rules/fake-ip-filter-domain.list
    # t-sub:include rules/fake-ip-filter-tailnet-domain.list
    # t-sub:include rules/fake-ip-filter-android-domain.list
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  proxy-server-nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  direct-nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  direct-nameserver-follow-policy: true
  nameserver:
    - https://1.1.1.1/dns-query
    - https://8.8.8.8/dns-query
  nameserver-policy:
    geosite:cn:
      - https://dns.alidns.com/dns-query
      - https://doh.pub/dns-query
    geosite:private:
      - https://dns.alidns.com/dns-query
      - https://doh.pub/dns-query

rule-providers:
  custom-direct-domain:
    type: http
    behavior: domain
    format: text
    path: ./ruleset/custom-direct-domain.list
    url: "{{RULE_BASE_URL}}/custom-direct-domain.list"
    interval: 86400
  custom-proxy-domain:
    type: http
    behavior: domain
    format: text
    path: ./ruleset/custom-proxy-domain.list
    url: "{{RULE_BASE_URL}}/custom-proxy-domain.list"
    interval: 86400
  pt-direct-domain:
    type: http
    behavior: domain
    format: text
    path: ./ruleset/pt-direct-domain.list
    url: "{{RULE_BASE_URL}}/pt-direct-domain.list"
    interval: 86400
  misc-direct-domain:
    type: http
    behavior: domain
    format: text
    path: ./ruleset/misc-direct-domain.list
    url: "{{RULE_BASE_URL}}/misc-direct-domain.list"
    interval: 86400
  android-fcm-domain:
    type: http
    behavior: domain
    format: text
    path: ./ruleset/android-fcm-domain.list
    url: "{{RULE_BASE_URL}}/android-fcm-domain.list"
    interval: 86400
  android-google-play-domain:
    type: http
    behavior: domain
    format: text
    path: ./ruleset/android-google-play-domain.list
    url: "{{RULE_BASE_URL}}/android-google-play-domain.list"
    interval: 86400
  japan-services-domain:
    type: http
    behavior: domain
    format: text
    path: ./ruleset/japan-services-domain.list
    url: "{{RULE_BASE_URL}}/japan-services-domain.list"
    interval: 86400
  openai:
    type: http
    behavior: domain
    format: mrs
    path: ./ruleset/openai.mrs
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/openai.mrs"
    interval: 86400
  private:
    type: http
    behavior: domain
    format: mrs
    path: ./ruleset/private.mrs
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/private.mrs"
    interval: 86400
  cn:
    type: http
    behavior: domain
    format: mrs
    path: ./ruleset/cn.mrs
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/cn.mrs"
    interval: 86400
  geoip-cn:
    type: http
    behavior: ipcidr
    format: mrs
    path: ./ruleset/geoip-cn.mrs
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geoip/cn.mrs"
    interval: 86400
  github:
    type: http
    behavior: domain
    format: mrs
    path: ./ruleset/github.mrs
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/github.mrs"
    interval: 86400

# Tailscale 出站，用于访问家庭内网。
# 首次启动会在 mihomo 日志里打印 https://login.tailscale.com/... 登录 URL，
# 浏览器登录一次即可，state 持久化到 state-dir，无需重复登录或配置 auth-key。
proxies:
  - name: tailscale
    type: tailscale
    hostname: mihomo-android
    control-url: https://controlplane.tailscale.com
    state-dir: ./tailscale
    ephemeral: false
    udp: true
    accept-routes: true
    ip-version: dual

proxy-groups:
  - name: 🚀 默认代理
    type: select
    include-all-proxies: true
    exclude-filter: (?i)(流量|剩余|到期|套餐|官网|traffic|expire)
    proxies:
      - ⚡ 全部自动
      - 🇯🇵 日本节点
      - 🇺🇸 美国节点
      - 🏠 回家
      - DIRECT
  - name: ⚡ 全部自动
    type: url-test
    lazy: true
    interval: 600
    timeout: 3000
    max-failed-times: 3
    expected-status: 204
    empty-fallback: REJECT
    include-all-proxies: true
    exclude-filter: (?i)(流量|剩余|到期|套餐|官网|traffic|expire)
  - name: 🇯🇵 日本节点
    type: select
    include-all-proxies: true
    exclude-filter: (?i)(流量|剩余|到期|套餐|官网|traffic|expire)
    filter: (?i)(^|[^a-z])jp([^a-z]|$)|日本|Japan|Tokyo|Osaka|东京|大阪
    proxies:
      - ♻️ 日本自动
  - name: ♻️ 日本自动
    type: url-test
    lazy: true
    interval: 600
    timeout: 3000
    max-failed-times: 3
    expected-status: 204
    empty-fallback: REJECT
    include-all-proxies: true
    exclude-filter: (?i)(流量|剩余|到期|套餐|官网|traffic|expire)
    filter: (?i)(^|[^a-z])jp([^a-z]|$)|日本|Japan|Tokyo|Osaka|东京|大阪
  - name: 🇺🇸 美国节点
    type: select
    include-all-proxies: true
    exclude-filter: (?i)(流量|剩余|到期|套餐|官网|traffic|expire)
    filter: (?i)(^|[^a-z])us([^a-z]|$)|美国|美國|USA|United States|America|Los Angeles|San Jose|Seattle|Dallas|Chicago|New York
    proxies:
      - ♻️ 美国自动
  - name: ♻️ 美国自动
    type: url-test
    lazy: true
    interval: 600
    timeout: 3000
    max-failed-times: 3
    expected-status: 204
    empty-fallback: REJECT
    include-all-proxies: true
    exclude-filter: (?i)(流量|剩余|到期|套餐|官网|traffic|expire)
    filter: (?i)(^|[^a-z])us([^a-z]|$)|美国|美國|USA|United States|America|Los Angeles|San Jose|Seattle|Dallas|Chicago|New York
  - name: 🏠 回家
    type: select
    proxies:
      - tailscale
      - DIRECT
  - name: 📲 谷歌推送
    type: select
    proxies:
      - 🚀 默认代理
      - ⚡ 全部自动
      - 🇯🇵 日本节点
      - 🇺🇸 美国节点
      - DIRECT

rules:
  # HOME_DOMAIN / TS_DOMAIN / tailnet -> 回家（不是直接 tailscale）
  - DOMAIN-SUFFIX,{{HOME_DOMAIN}},🏠 回家
  - DOMAIN-SUFFIX,{{TS_DOMAIN}},🏠 回家
  - IP-CIDR,192.168.1.0/24,🏠 回家,no-resolve
  - IP-CIDR,192.168.2.0/24,🏠 回家,no-resolve
  - IP-CIDR,100.64.0.0/10,🏠 回家,no-resolve
  - IP-CIDR6,fd7a:115c:a1e0::/48,🏠 回家,no-resolve
  # 本地安全 - DIRECT
  - DOMAIN-SUFFIX,localhost,DIRECT
  - RULE-SET,private,DIRECT
  # 自定义规则
  - RULE-SET,custom-direct-domain,DIRECT
  - RULE-SET,custom-proxy-domain,🚀 默认代理
  # PT / 杂项直连
  - RULE-SET,pt-direct-domain,DIRECT
  - RULE-SET,misc-direct-domain,DIRECT
  # FCM / Google Play
  - RULE-SET,android-fcm-domain,📲 谷歌推送
  - RULE-SET,android-google-play-domain,🚀 默认代理
  # AI / 开发
  - RULE-SET,openai,🚀 默认代理
  - RULE-SET,github,🚀 默认代理
  # 日本服务
  - RULE-SET,japan-services-domain,🇯🇵 日本节点
  # 国内
  - RULE-SET,cn,DIRECT
  - RULE-SET,geoip-cn,DIRECT,no-resolve
  - MATCH,🚀 默认代理
