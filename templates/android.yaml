# Android mihomo 配置模板 — 生成于 {{GENERATED_AT}}
# 内置 tailscale 出站用于回家，包含 FCM 推送和 Google Play 规则。
# 生成时 {{RULE_BASE_URL}} 会自动替换为 Worker 的 /rules 地址。

mixed-port: 7890
allow-lan: false
bind-address: '*'
mode: rule
log-level: info
ipv6: true
global-client-fingerprint: chrome
unified-delay: true
tcp-concurrent: true

profile:
  store-selected: true
  store-fake-ip: true

tun:
  enable: true
  stack: mixed
  auto-route: true
  strict-route: true
  auto-detect-interface: true
  dns-hijack:
    - any:53

sniffer:
  enable: true
  force-dns-mapping: true
  parse-pure-ip: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]

dns:
  enable: true
  listen: 127.0.0.1:1053
  ipv6: true
  cache-algorithm: arc
  respect-rules: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    # t-sub:include rules/fake-ip-filter-common-domain.list
    # t-sub:include rules/fake-ip-filter-home-domain.list
    # t-sub:include rules/fake-ip-filter-tailnet-domain.list
    # t-sub:include rules/fake-ip-filter-android-domain.list
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  proxy-server-nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  direct-nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  direct-nameserver-follow-policy: true
  nameserver:
    - https://1.1.1.1/dns-query
    - https://8.8.8.8/dns-query
  nameserver-policy:
    "rule-set:cn_domain":
      - https://dns.alidns.com/dns-query
      - https://doh.pub/dns-query
    "rule-set:private_domain":
      - https://dns.alidns.com/dns-query
      - https://doh.pub/dns-query
    "rule-set:japan-services-domain":
      - https://1.1.1.1/dns-query
      - https://8.8.8.8/dns-query

rule-providers:
  # 本地小规则 — text 格式，由 Worker /rules 托管
  custom-direct-domain:
    type: http
    behavior: domain
    format: text
    path: ./ruleset/local/custom-direct-domain.list
    url: "{{RULE_BASE_URL}}/custom-direct-domain.list"
    interval: 86400
    proxy: 🚀 默认代理
  custom-proxy-domain:
    type: http
    behavior: domain
    format: text
    path: ./ruleset/local/custom-proxy-domain.list
    url: "{{RULE_BASE_URL}}/custom-proxy-domain.list"
    interval: 86400
    proxy: 🚀 默认代理
  pt-direct-domain:
    type: http
    behavior: domain
    format: text
    path: ./ruleset/local/pt-direct-domain.list
    url: "{{RULE_BASE_URL}}/pt-direct-domain.list"
    interval: 86400
    proxy: 🚀 默认代理
  misc-direct-domain:
    type: http
    behavior: domain
    format: text
    path: ./ruleset/local/misc-direct-domain.list
    url: "{{RULE_BASE_URL}}/misc-direct-domain.list"
    interval: 86400
    proxy: 🚀 默认代理
  japan-services-domain:
    type: http
    behavior: domain
    format: text
    path: ./ruleset/local/japan-services-domain.list
    url: "{{RULE_BASE_URL}}/japan-services-domain.list"
    interval: 86400
    proxy: 🚀 默认代理
  android-fcm-domain:
    type: http
    behavior: domain
    format: text
    path: ./ruleset/local/android-fcm-domain.list
    url: "{{RULE_BASE_URL}}/android-fcm-domain.list"
    interval: 86400
    proxy: 🚀 默认代理
  android-google-play-domain:
    type: http
    behavior: domain
    format: text
    path: ./ruleset/local/android-google-play-domain.list
    url: "{{RULE_BASE_URL}}/android-google-play-domain.list"
    interval: 86400
    proxy: 🚀 默认代理
  # 远程 MRS 规则 — 由 mihomo 客户端从 MetaCubeX 自动更新
  private_domain:
    type: http
    behavior: domain
    format: mrs
    path: ./ruleset/meta/private_domain.mrs
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/private.mrs"
    interval: 86400
    proxy: 🚀 默认代理
  private_ip:
    type: http
    behavior: ipcidr
    format: mrs
    path: ./ruleset/meta/private_ip.mrs
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geoip/private.mrs"
    interval: 86400
    proxy: 🚀 默认代理
  cn_domain:
    type: http
    behavior: domain
    format: mrs
    path: ./ruleset/meta/cn_domain.mrs
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/cn.mrs"
    interval: 86400
    proxy: 🚀 默认代理
  cn_ip:
    type: http
    behavior: ipcidr
    format: mrs
    path: ./ruleset/meta/cn_ip.mrs
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geoip/cn.mrs"
    interval: 86400
    proxy: 🚀 默认代理
  openai_domain:
    type: http
    behavior: domain
    format: mrs
    path: ./ruleset/meta/openai_domain.mrs
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/openai.mrs"
    interval: 86400
    proxy: 🚀 默认代理
  github_domain:
    type: http
    behavior: domain
    format: mrs
    path: ./ruleset/meta/github_domain.mrs
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/github.mrs"
    interval: 86400
    proxy: 🚀 默认代理
  tracker_domain:
    type: http
    behavior: domain
    format: mrs
    path: ./ruleset/meta/tracker_domain.mrs
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/tracker.mrs"
    interval: 86400
    proxy: 🚀 默认代理
  jp_ip:
    type: http
    behavior: ipcidr
    format: mrs
    path: ./ruleset/meta/jp_ip.mrs
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geoip/jp.mrs"
    interval: 86400
    proxy: 🚀 默认代理
  googlefcm_domain:
    type: http
    behavior: domain
    format: mrs
    path: ./ruleset/meta/googlefcm_domain.mrs
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/googlefcm.mrs"
    interval: 86400
    proxy: 🚀 默认代理
  googleplay_domain:
    type: http
    behavior: domain
    format: mrs
    path: ./ruleset/meta/googleplay_domain.mrs
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/google-play.mrs"
    interval: 86400
    proxy: 🚀 默认代理

# Tailscale 出站，仅用于回家访问家庭内网。
# 首次启动在 mihomo 日志中打印 https://login.tailscale.com/... 登录 URL，
# 浏览器登录一次即持久化到 state-dir，之后自动复用。
proxies:
  - name: tailscale
    type: tailscale
    hostname: mihomo-android
    control-url: https://controlplane.tailscale.com
    state-dir: ./tailscale
    ephemeral: false
    udp: true
    accept-routes: true
    ip-version: dual

proxy-groups:
  - name: 🚀 默认代理
    type: select
    proxies:
      - ⚡ 全部自动
      - 🇯🇵 日本节点
      - 🇺🇸 美国节点
      - ♻️ 日本自动
      - ♻️ 美国自动
      - 🏠 回家
      - DIRECT
  - name: ⚡ 全部自动
    type: url-test
    include-all-proxies: true
    exclude-filter: (?i)(^|[^a-z])流量|剩余|到期|套餐|官网|traffic|expire|剩餘|過期
    url: https://cp.cloudflare.com/generate_204
    interval: 600
    lazy: true
    tolerance: 80
    timeout: 3000
    max-failed-times: 3
    expected-status: 204
    empty-fallback: REJECT
  - name: 🇯🇵 日本节点
    type: select
    include-all-proxies: true
    exclude-filter: (?i)(^|[^a-z])流量|剩余|到期|套餐|官网|traffic|expire|剩餘|過期
    filter: (?i)(^|[^a-z])jp([^a-z]|$)|日本|Japan|Tokyo|Osaka|东京|大阪
    proxies:
      - ♻️ 日本自动
  - name: ♻️ 日本自动
    type: url-test
    include-all-proxies: true
    exclude-filter: (?i)(^|[^a-z])流量|剩余|到期|套餐|官网|traffic|expire|剩餘|過期
    filter: (?i)(^|[^a-z])jp([^a-z]|$)|日本|Japan|Tokyo|Osaka|东京|大阪
    url: https://cp.cloudflare.com/generate_204
    interval: 600
    lazy: true
    tolerance: 80
    timeout: 3000
    max-failed-times: 3
    expected-status: 204
    empty-fallback: REJECT
  - name: 🇺🇸 美国节点
    type: select
    include-all-proxies: true
    exclude-filter: (?i)(^|[^a-z])流量|剩余|到期|套餐|官网|traffic|expire|剩餘|過期
    filter: (?i)(^|[^a-z])us([^a-z]|$)|美国|United States|USA|America|Los Angeles|San Jose|Seattle|New York|Dallas|美國|洛杉矶|圣何塞|西雅图|纽约|达拉斯
    proxies:
      - ♻️ 美国自动
  - name: ♻️ 美国自动
    type: url-test
    include-all-proxies: true
    exclude-filter: (?i)(^|[^a-z])流量|剩余|到期|套餐|官网|traffic|expire|剩餘|過期
    filter: (?i)(^|[^a-z])us([^a-z]|$)|美国|United States|USA|America|Los Angeles|San Jose|Seattle|New York|Dallas|美國|洛杉矶|圣何塞|西雅图|纽约|达拉斯
    url: https://cp.cloudflare.com/generate_204
    interval: 600
    lazy: true
    tolerance: 80
    timeout: 3000
    max-failed-times: 3
    expected-status: 204
    empty-fallback: REJECT
  - name: 🏠 回家
    type: select
    proxies:
      - tailscale
      - DIRECT
  - name: 📲 谷歌推送
    type: select
    proxies:
      - 🚀 默认代理
      - 🇺🇸 美国节点
      - DIRECT

rules:
  # 1. 家庭 / Tailnet 回家
  - DOMAIN-SUFFIX,{{HOME_DOMAIN}},🏠 回家
  - DOMAIN-SUFFIX,{{TS_DOMAIN}},🏠 回家
  - IP-CIDR,192.168.1.0/24,🏠 回家,no-resolve
  - IP-CIDR,192.168.2.0/24,🏠 回家,no-resolve
  - IP-CIDR,100.64.0.0/10,🏠 回家,no-resolve
  - IP-CIDR6,fd7a:115c:a1e0::/48,🏠 回家,no-resolve
  # 2. 本地安全直连
  - DOMAIN-SUFFIX,localhost,DIRECT
  - DOMAIN-SUFFIX,lan,DIRECT
  - DOMAIN-SUFFIX,local,DIRECT
  - IP-CIDR,127.0.0.0/8,DIRECT,no-resolve
  - IP-CIDR,10.0.0.0/8,DIRECT,no-resolve
  - IP-CIDR,172.16.0.0/12,DIRECT,no-resolve
  - IP-CIDR,192.168.0.0/16,DIRECT,no-resolve
  - IP-CIDR6,fc00::/7,DIRECT,no-resolve
  - IP-CIDR6,fe80::/10,DIRECT,no-resolve
  - RULE-SET,private_domain,DIRECT
  - RULE-SET,private_ip,DIRECT,no-resolve
  # 3. 最高人工直连
  - RULE-SET,custom-direct-domain,DIRECT
  # 4. 日本网站强制日本
  - RULE-SET,japan-services-domain,🇯🇵 日本节点
  - RULE-SET,jp_ip,🇯🇵 日本节点,no-resolve
  # 5. 人工指定代理
  - RULE-SET,custom-proxy-domain,🚀 默认代理
  # 6. Android 推送和商店
  - RULE-SET,googlefcm_domain,📲 谷歌推送
  - RULE-SET,android-fcm-domain,📲 谷歌推送
  - RULE-SET,googleplay_domain,🚀 默认代理
  - RULE-SET,android-google-play-domain,🚀 默认代理
  # 7. PT / Tracker / 杂项直连
  - RULE-SET,tracker_domain,DIRECT
  - RULE-SET,pt-direct-domain,DIRECT
  - RULE-SET,misc-direct-domain,DIRECT
  # 8. AI / 开发服务固定美国
  - RULE-SET,openai_domain,🇺🇸 美国节点
  - RULE-SET,github_domain,🇺🇸 美国节点
  # 9. 国内直连
  - RULE-SET,cn_domain,DIRECT
  - RULE-SET,cn_ip,DIRECT,no-resolve
  # 10. 兜底
  - MATCH,🚀 默认代理
